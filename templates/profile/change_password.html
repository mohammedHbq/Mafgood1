{% extends "base.html" %}
{% block title %}تغيير كلمة المرور - مفقود{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-4">
                <h3 class="fw-bold mb-4"><i class="bi bi-key text-warning"></i> تغيير كلمة المرور</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label fw-bold">كلمة المرور الحالية</label>
                        <input type="password" name="current_password" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">كلمة المرور الجديدة</label>
                        <input type="password" name="new_password" class="form-control" required minlength="6">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">تأكيد كلمة المرور الجديدة</label>
                        <input type="password" name="confirm_password" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-warning w-100 fw-bold">تغيير كلمة المرور</button>
                </form>
                <a href="{{ url_for('profile.my_profile') }}" class="btn btn-outline-secondary w-100 mt-2">إلغاء</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
