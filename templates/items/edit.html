{% extends "base.html" %}
{% block title %}تعديل الغرض - مفقود{% endblock %}
{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-md-7">
            <div class="card p-4">
                <h3 class="fw-bold mb-4"><i class="bi bi-pencil text-primary"></i> تعديل الغرض</h3>
                <form method="POST" enctype="multipart/form-data">
                    <div class="mb-3">
                        <label class="form-label fw-bold">اسم الغرض</label>
                        <input type="text" name="item_name" class="form-control" value="{{ item.item_name }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">الفئة</label>
                        <select name="category" class="form-select">
                            {% for cat in categories %}
                            <option value="{{ cat.value }}" {% if cat == item.category %}selected{% endif %}>{{ cat.value }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">الموقع</label>
                        <input type="text" name="location" class="form-control" value="{{ item.location or '' }}">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">الوصف</label>
                        <textarea name="description" class="form-control" rows="4">{{ item.description or '' }}</textarea>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold">تغيير الصورة</label>
                        <input type="file" name="image" class="form-control" accept="image/*">
                    </div>
                    <button type="submit" class="btn btn-primary w-100 fw-bold">حفظ التعديلات</button>
                </form>
                <a href="{{ url_for('items.item_detail', item_id=item.id) }}" class="btn btn-outline-secondary w-100 mt-2">إلغاء</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
